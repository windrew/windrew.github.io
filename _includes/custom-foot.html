<!-- Code Copy Button -->
<script>
  document.querySelectorAll('div.highlight').forEach((copyButtonWrapper) => {
    if (copyButtonWrapper.querySelector('.copy-code-button')) return;

    const copyButton = document.createElement('button');
    copyButton.className = 'copy-code-button';
    copyButton.type = 'button';
    copyButton.innerText = 'Copy';

    copyButtonWrapper.append(copyButton);

    copyButton.addEventListener('click', () => {
      const codeElement = copyButtonWrapper.querySelector('pre code') || copyButtonWrapper.querySelector('pre');
      const code = codeElement.innerText;
      navigator.clipboard.writeText(code).then(() => {
        copyButton.innerText = 'Copied!';
        setTimeout(() => {
          copyButton.innerText = 'Copy';
        }, 2000);
      });
    });
  });
</script>
